version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flower-shop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: floweruser
      POSTGRES_PASSWORD: flowerpassword
      POSTGRES_DB: flowerdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
